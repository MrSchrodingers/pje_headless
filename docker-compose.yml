services:
  # Modo PFX (A1) - servidor PJeOffice :8800. Template; ajuste o volume do PFX.
  pjeoffice-headless:
    build:
      context: .
      target: runtime
    image: pjeoffice-headless:2.0
    container_name: pjeoffice-headless
    environment:
      PJE_SIGNER_PRIORITY: "pfx"
      PJE_PFX_PATH: "/run/secrets/cert.pfx"
      # PJE_PFX_PASS: defina via --env-file ou Docker secret; nao coloque aqui
      PJE_PJEOFFICE_PORT: "8800"
      PJE_BIND_ADDR: "0.0.0.0"   # dentro do container; porta mapeada so em loopback abaixo
    volumes:
      - /dev/null:/run/secrets/cert.pfx:ro   # placeholder - substitua antes de usar
    ports:
      - "127.0.0.1:8800:8800"
    restart: unless-stopped
    profiles: ["pfx"]

  # LoginService gRPC (login headless do jus.br). Requer Chromium -> imagem
  # runtime-chrome. Delega a assinatura ao SignerService remoto (host do token)
  # via PJE_SIGNER_REMOTE_ADDR (definido no .env, fora do repo). Publica :9091 no
  # host para consumidores em outras redes (ex.: o worker). Segredos vem do .env.
  login-service:
    build:
      context: .
      target: runtime-chrome
    image: pjeoffice-headless:2.0-login
    container_name: pjeheadless_login
    env_file:
      - .env
    environment:
      PJE_MODE: "login-service"
      PJE_SIGNER_PRIORITY: "remote"
      PJE_LOGIN_GRPC_ADDR: "0.0.0.0:9091"
      PJE_PJEOFFICE_PORT: "8800"
      PJE_BIND_ADDR: "127.0.0.1"
      PJE_CHROME_PATH: "/usr/bin/chromium"
    ports:
      - "9091:9091"
    healthcheck:
      disable: true
    restart: unless-stopped

  # Ticker de 2FA (TOTP): codigo atual no log para captura MANUAL via
  # `docker logs -f pjeheadless_totp`. Nao precisa de Chromium (imagem slim).
  totp:
    build:
      context: .
      target: runtime
    image: pjeoffice-headless:2.0
    container_name: pjeheadless_totp
    env_file:
      - .env
    environment:
      PJE_MODE: "totp"
    healthcheck:
      disable: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "2"
